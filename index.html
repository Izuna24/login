<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
    <meta name="description" content="formulario de cadastro">
    <meta name=author content="joao pedro">
    </meta:name>
    <meta name="keywords" content="html, css, javascript">


    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <form action="/login/index.html" method="get">

        <h1>Login</h1>
<div class="container"> 
    <p class="p_top">Entre com seus dados de acesso</p> 
        <div class="input">
            <p>Usuario</p>
            <input class="txt" type="email" name="User" id="email" required>
        </div>

        <div class="input">
            <p for="password">Senha</p>
            <input class="txt" type="password" name="senha" id="password" required>
        </div>

        <div class="enviar">
            <input id="limpar" class="botao" type="reset" value="Limpar">
            <input id="entrar" class="botao" type="submit" value="Entrar">
        </div>
    </div>
    </form>
</body>

</html>
